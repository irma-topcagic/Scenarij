<!doctype html>
<html lang="bs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>ScenarijPro</title>
  <link rel="stylesheet" href="../css/writing.css" />
</head>
<body>
  <div class="pisanjescenarija">

    <header class="zaglavlje">
      <div class="lijevo-zaglavlje">
        <button class="strelica" id="btnNazad">
          <span class="dugme-nazad">Nazad</span>
        </button>
        <div class="naslovprojekta" id="naslovProjekta">ScenarijPro</div>
      </div>

      <div class="srednje-zaglavlje">
        <button class="tag-btn">SCENA</button>
        <button class="tag-btn">AKCIJA</button>
        <button class="tag-btn">LIK</button>
        <button class="tag-btn">DIJALOG</button>
      </div>

      <div class="desno-zaglavlje">
        <button class="zeleno-btn" id="btnSpasi">Spasi</button>
      </div>
    </header>

    
    <div class="toolbar">
      <button id="btnBold">Bold</button>
      <button id="btnItalic">Italic</button>
      <button id="btnUnderline">Underline</button>

      <button id="btnBrojRijeci">Broj riječi</button>
      <button id="btnDajUloge">Uloge</button>
      <button id="btnPogresneUloge">Pogresna Uloga</button>
      <input id="inputUloga" placeholder="Ime uloge" />
      <button id="btnBrojLinija">Broj Linija</button>
      <button id="btnScenarijUloge">Scenarij Uloge</button>
      <button id="btnGrupisi">Grupisi Uloge</button>
    </div>

    <main class="layout">

     <aside class="sidebar">
  <h2 class="sidebar-title">Scene (3)</h2>
  <ul class="scene-list">
    <li class="scene-item active">
      <div class="scene-header">1. INT. THE LAST DAY - NIGHT</div>
      <div class="scene-pages">(12/14)</div>
    </li>
    <li class="scene-item">
      <div class="scene-header">2. EXT. LAWYER FROM LINCOLN - DAY</div>
      <div class="scene-pages">(13/28)</div>
    </li>
    <li class="scene-item">
      <div class="scene-header">3. INT. GLADIATOR GAMES - NIGHT</div>
      <div class="scene-pages">(2/57)</div>
    </li>
  </ul>
</aside>

      <section class="editor">

        <div class="panel" id="panelKontrole">

  <div class="panel-grid">

    <div class="box">
      <div class="box-title">Scenarij</div>

      <div class="field">
        <label>User ID:</label>
        <input id="inpUserId" type="number" value="1" />
      </div>

      <div class="field">
        <label>Scenario ID:</label>
        <input id="inpScenarioId" type="number" placeholder="npr. 2" />
        <button class="btn btn-blue" id="btnUcitajScenarij">Učitaj scenarij</button>
      </div>

      <div class="field">
        <label>Novi scenarij:</label>
        <input id="inpNoviNaslov" placeholder="Naslov scenarija" />
        <button class="btn btn-orange" id="btnKreirajNovi">Kreiraj novi scenarij</button>
      </div>
    </div>

    <div class="box">
      <div class="box-title">Linije</div>

      <div class="field">
        <label>Line ID (za lock):</label>
        <input id="inpLineLockId" type="number" placeholder="ID linije" />
        <button class="btn btn-purple" id="btnZakljucajLiniju">Zaključaj liniju</button>
      </div>

      <div class="field">
        <label>Line ID za ažuriranje:</label>
        <input id="inpLineUpdateId" type="number" placeholder="ID linije" />
      </div>

      <div class="field">
        <label>Novi tekst linije:</label>
        <textarea id="inpNoviTekstLinije" rows="3" placeholder="Upiši tekst..."></textarea>
        <button class="btn btn-orange" id="btnAzurirajLiniju">Ažuriraj liniju</button>
      </div>
    </div>

    <div class="box">
      <div class="box-title">Likovi</div>

      <div class="field">
        <label>Zaključaj ime lika:</label>
        <input id="inpLockChar" placeholder="Ime lika" />
        <button class="btn btn-purple" id="btnZakljucajIme">Zaključaj ime</button>
      </div>

      <div class="field">
        <label>Staro ime:</label>
        <input id="inpOldName" placeholder="Staro ime" />
      </div>

      <div class="field">
        <label>Novo ime:</label>
        <input id="inpNewName" placeholder="Novo ime" />
        <button class="btn btn-blue" id="btnPromijeniIme">Promijeni ime</button>
      </div>
    </div>

    <div class="box">
      <div class="box-title">Promjene (deltas)</div>

      <div class="field">
        <label>Delta promjene (since):</label>
        <input id="inpSince" type="number" value="0" />
        <button class="btn btn-blue" id="btnUcitajPromjene">Učitaj promjene</button>
      </div>
    </div>

  </div>
<div id="upozorenje" style="display:none;"></div>
  <div id="poruke" style="display:none;"></div>
</div>

<div class="papir" id="divEditor" contenteditable="true"></div>

      </section>
    </main>

  </div>

  <script src="../js/EditorTeksta.js"></script>
  <script src="../js/PoziviAjaxFetch.js"></script>
  <script src="../js/editor.js"></script>
</body>
</html>
